name: Chatbot Backend Tests

on:
  push:
    paths:
      - app/**
      - config/**
      - composer.json
      - composer.lock
      - phpunit.xml
      - routes/**
      - tests/Feature/Chatbot/**
      - .github/workflows/chatbot-backend-tests.yml
  pull_request:
    paths:
      - app/**
      - config/**
      - composer.json
      - composer.lock
      - phpunit.xml
      - routes/**
      - tests/Feature/Chatbot/**
      - .github/workflows/chatbot-backend-tests.yml

jobs:
  chatbot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite, dom, fileinfo
          coverage: none

      - name: Setup Composer
        uses: ramsey/composer-install@v3
        with:
          working-directory: .

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run chatbot feature tests
        run: php artisan test tests/Feature/Chatbot